<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What are you doing?</title>
  <style>
    :root {
      --bg: #f7f2ea;
      --surface: #f7f2ea;
      --surface-2: #fffaf5;
      --text: #2f2925;
      --muted: #85786c;
      --line: #ddd1c3;
      --accent: #df9743;
      --accent-strong: #c97f29;
      --accent-soft: #f7e1c6;
      --button-soft: #efe3d5;
      --shadow: 0 8px 24px rgba(90, 60, 22, 0.08);
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-width: 180px;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 100%;
      padding: 18px 18px 22px;
    }

    .panel {
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 12px;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px;
      border-radius: var(--radius);
      background: #ece4da;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-toggle {
      border: 0;
      cursor: pointer;
      padding: 8px 12px;
    }

    .status.on {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .status.on .dot {
      color: #d33b2f;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      flex: 0 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px;
      align-items: start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .clock-wrap { min-width: 0; }

    .clock {
      font-size: clamp(58px, 18vw, 104px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.06em;
      margin: 4px 0 10px;
      font-variant-numeric: tabular-nums;
    }

    .date {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .cat-wrap {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      height: clamp(58px, 18vw, 104px);
      padding-top: 4px;
    }

    .cat-wrap img {
      display: block;
      width: 88px;
      height: auto;
      image-rendering: auto;
    }

    .next-card {
      border-radius: var(--radius);
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--line);
      padding: 14px;
      margin-bottom: 14px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .next-title {
      font-size: 18px;
      line-height: 1.3;
      font-weight: 700;
    }

    .next-title-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 5px;
    }

    .next-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 700;
    }

    .today-schedule {
      display: grid;
      gap: 7px;
      margin: -6px 0 14px;
    }

    .schedule-item {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 34px;
      padding: 7px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.34);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
    }

    .schedule-time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .schedule-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .schedule-delete {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
    }

    .schedule-delete[hidden] {
      display: none;
    }

    .schedule-delete:hover {
      background: #f8dfcc;
      color: #b86429;
    }

    .schedule-delete span {
      display: block;
      font-size: 17px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 12px 0 10px;
    }

    .calendar-open {
      width: 100%;
      margin-bottom: 14px;
    }

    button, input, textarea, select { font: inherit; }

    button, .button-link {
      border: 0;
      border-radius: var(--radius);
      padding: 13px 14px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      text-decoration: none;
    }

    .button-link[aria-disabled="true"] {
      opacity: 0.55;
    }

    .button-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .button-icon svg {
      display: block;
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    button:hover, .button-link:hover { opacity: 0.95; }
    button:active, .button-link:active { transform: translateY(1px); }

    .primary {
      background: var(--accent);
      color: white;
      box-shadow: var(--shadow);
    }

    .secondary {
      background: var(--button-soft);
      color: var(--text);
    }

    .danger {
      background: #f8dfcc;
      color: #b86429;
    }

    details {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 8px;
    }

    summary {
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 6px;
      list-style: none;
      position: relative;
      padding-left: 22px;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      content: "▶";
      position: absolute;
      left: 6px;
      top: 0;
      font-size: 12px;
      line-height: 1.8;
      color: var(--text);
    }

    details[open] summary::before {
      content: "▼";
    }

    .form {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field span {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 11px;
      background: rgba(255,255,255,0.72);
      color: var(--text);
    }

    textarea {
      min-height: 74px;
      resize: vertical;
      line-height: 1.5;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .weekday-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .weekday-option {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.62);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .weekday-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .weekday-option:has(input:checked) {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .meeting-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .meeting {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.6);
    }

    .meeting strong {
      display: block;
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
    }

    .meeting small {
      color: var(--muted);
      line-height: 1.5;
      font-weight: 700;
    }

    .small-btn {
      padding: 8px 10px;
      font-size: 12px;
      border-radius: var(--radius);
    }

    @media (max-width: 430px) {
      .app { padding: 20px; }
      .hero { grid-template-columns: minmax(0, 1fr) 74px; gap: 10px; }
      .cat-wrap { height: clamp(52px, 20vw, 82px); }
      .cat-wrap img { width: 70px; }
      .clock { font-size: clamp(52px, 20vw, 82px); }
      .weekday-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 360px) {
      .actions, .row { grid-template-columns: 1fr; }
      .hero { grid-template-columns: minmax(0, 1fr) 60px; }
      .cat-wrap img { width: 56px; }
    }
  </style>
</head>

          <span class="button-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M440-760v-160h80v160h-80Zm266 110-55-55 112-115 56 57-113 113Zm54 210v-80h160v80H760ZM440-40v-160h80v160h-80ZM254-652 140-763l57-56 113 113-56 54Zm508 512L651-255l54-54 114 110-57 59ZM40-440v-80h160v80H40Zm157 300-56-57 112-112 29 27 29 28-114 114Zm113-170q-70-70-70-170t70-170q70-70 170-70t170 70q70 70 70 170t-70 170q-70 70-170 70t-170-70Zm283-57q47-47 47-113t-47-113q-47-47-113-47t-113 47q-47 47-47 113t47 113q47 47 113 47t113-47ZM480-480Z"/></svg></span>

        <span class="button-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M680-80v-120H560v-80h120v-120h80v120h120v80H760v120h-80Zm-480-80q-33 0-56.5-23.5T120-240v-480q0-33 23.5-56.5T200-800h40v-80h80v80h240v-80h80v80h40q33 0 56.5 23.5T760-720v244q-20-3-40-3t-40 3v-84H200v320h280q0 20 3 40t11 40H200Zm0-480h480v-80H200v80Zm0 0v-80 80Z"/></svg></span>

      <details open>

        <div class="form">

              <label class="weekday-option"><input type="checkbox" value="1" />月</label>
              <label class="weekday-option"><input type="checkbox" value="2" />火</label>
              <label class="weekday-option"><input type="checkbox" value="3" />水</label>
              <label class="weekday-option"><input type="checkbox" value="4" />木</label>
              <label class="weekday-option"><input type="checkbox" value="5" />金</label>
              <label class="weekday-option"><input type="checkbox" value="6" />土</label>
              <label class="weekday-option"><input type="checkbox" value="0" />日</label>
            </div>
          </div>

          <div class="row">
            <div class="field">
              <span>開始時刻</span>
              <input id="recurringTime" type="time" />
            </div>

              <input id="recurringBefore" type="number" value="2" min="0" max="120" />
            </div>

          <button class="primary" id="addRecurringBtn">固定ミーティングを追加</button>

    </section>
  </main>

  <script>
    const STORAGE_KEY = "work_chime_clock_v2";

    const defaultState = {
      running: false,
      hourlyEnabled: true,
      defaultBefore: 2,
      hourlyText: "{hour}時です。ここまでの作業を軽く記録しましょう。",
      calendarUrl: "calendar.html",
      voiceName: "",
      voiceRate: 1,
      voicePitch: 1.15,
      morningMtgUrl: "",
      nightMtgUrl: "",
      meetings: [
        {
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          date: new Date().toISOString().slice(0, 10),
          time: "13:00",
          title: "サンプル打ち合わせ",
          text: "",
          before: 2
        }
      ],
      recurringMeetings: [],
      skippedRecurring: {},
      spokenKeys: {}
    };

    let state = loadState();
    state.hourlyEnabled = true;

    const el = {
      clock: document.getElementById("clock"),
      dateText: document.getElementById("dateText"),
      status: document.getElementById("statusToggle"),
      statusText: document.getElementById("statusText"),
      nextTitle: document.getElementById("nextTitle"),
      nextMeta: document.getElementById("nextMeta"),
      nextDeleteBtn: document.getElementById("nextDeleteBtn"),
      statusToggle: document.getElementById("statusToggle"),
      todaySchedule: document.getElementById("todaySchedule"),
      morningMtgLink: document.getElementById("morningMtgLink"),
      nightMtgLink: document.getElementById("nightMtgLink"),
      openCalendarBtn: document.getElementById("openCalendarBtn"),
      hourlyText: document.getElementById("hourlyText"),
      calendarUrl: document.getElementById("calendarUrl"),
      morningMtgUrl: document.getElementById("morningMtgUrl"),
      nightMtgUrl: document.getElementById("nightMtgUrl"),
      voiceSelect: document.getElementById("voiceSelect"),
      voiceRate: document.getElementById("voiceRate"),
      voicePitch: document.getElementById("voicePitch"),
      testVoiceBtn: document.getElementById("testVoiceBtn"),
      meetingTime: document.getElementById("meetingTime"),
      meetingBefore: document.getElementById("meetingBefore"),
      meetingTitle: document.getElementById("meetingTitle"),
      meetingText: document.getElementById("meetingText"),
      addMeetingBtn: document.getElementById("addMeetingBtn"),
      recurringTitle: document.getElementById("recurringTitle"),
      recurringWeekdays: document.getElementById("recurringWeekdays"),
      recurringTime: document.getElementById("recurringTime"),
      recurringBefore: document.getElementById("recurringBefore"),
      addRecurringBtn: document.getElementById("addRecurringBtn"),
      recurringList: document.getElementById("recurringList")
    };

    function deepClone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return deepClone(defaultState);
      try {
        return { ...deepClone(defaultState), ...JSON.parse(saved) };
      } catch {
        return deepClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function toDateTime(date, time) {
      const [y, m, d] = date.split("-").map(Number);
      const [hh, mm] = time.split(":").map(Number);
      return new Date(y, m - 1, d, hh, mm, 0, 0);
    }

    function formatDate(now) {
      const days = ["日", "月", "火", "水", "木", "金", "土"];
      return `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日（${days[now.getDay()]}）`;
    }

    let availableVoices = [];

    function loadVoices() {
      availableVoices = window.speechSynthesis.getVoices();

      const currentValue = state.voiceName || "";
      const japaneseVoices = availableVoices.filter(voice => voice.lang && voice.lang.toLowerCase().startsWith("ja"));

      el.voiceSelect.innerHTML = '<option value="">自動</option>';

      japaneseVoices.forEach(voice => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = `${voice.name}（${voice.lang}）`;
        el.voiceSelect.appendChild(option);
      });

      el.voiceSelect.value = currentValue;
    }

    function getSelectedVoice() {
      if (!availableVoices.length) {
        availableVoices = window.speechSynthesis.getVoices();
      }

      if (state.voiceName) {
        const selected = availableVoices.find(voice => voice.name === state.voiceName);
        if (selected) return selected;
      }

      return availableVoices.find(voice => voice.lang === "ja-JP")
        || availableVoices.find(voice => voice.lang && voice.lang.toLowerCase().startsWith("ja"))
        || null;
    }

    function speak(text) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ja-JP";

      const selectedVoice = getSelectedVoice();
      if (selectedVoice) {
        u.voice = selectedVoice;
        u.lang = selectedVoice.lang;
      }

      u.rate = Number(state.voiceRate || 1);
      u.pitch = Number(state.voicePitch || 1.15);

      window.speechSynthesis.speak(u);
    }

    function makeMeetingText(meeting) {
      const [h, m] = meeting.time.split(":");
      const hourText = Number(m) === 0 ? `${Number(h)}時` : `${Number(h)}時${Number(m)}分`;
      return meeting.text || `まもなく${hourText}から、${meeting.title}です。資料を開いてください。`;
    }

    function makeRecurringText(meeting) {
      const [h, m] = meeting.time.split(":");
      const hourText = Number(m) === 0 ? `${Number(h)}時` : `${Number(h)}時${Number(m)}分`;
      return `まもなく${hourText}から、${meeting.title}です。`;
    }

    function weekdayLabel(days) {
      const names = ["日", "月", "火", "水", "木", "金", "土"];
      return [...days].sort((a, b) => a - b).map(day => names[day]).join("・");
    }

    function dateKey(dateObj) {
      return `${dateObj.getFullYear()}-${pad(dateObj.getMonth() + 1)}-${pad(dateObj.getDate())}`;
    }

    function getEvents(now) {
      const events = [];

      if (state.hourlyEnabled) {
        const nextHour = new Date(now);
        nextHour.setMinutes(0, 0, 0);
        if (nextHour <= now) nextHour.setHours(nextHour.getHours() + 1);

        events.push({
          type: "hourly",
          at: nextHour,
          title: `${nextHour.getHours()}時の時報`,
          text: state.hourlyText.replaceAll("{hour}", nextHour.getHours()),
          key: `hourly-${nextHour.toISOString().slice(0, 13)}`
        });
      }

      state.meetings.forEach(meeting => {
        const meetingAt = toDateTime(meeting.date, meeting.time);
        const before = Number(meeting.before || state.defaultBefore || 2);
        const alarmAt = new Date(meetingAt.getTime() - before * 60 * 1000);

        if (meetingAt >= now || alarmAt >= new Date(now.getTime() - 60 * 1000)) {
          events.push({
            type: "meeting",
            at: alarmAt,
            meetingAt,
            title: meeting.title,
            text: makeMeetingText(meeting),
            key: `meeting-${meeting.id}-${meeting.date}-${meeting.time}`,
            kind: "meeting",
            id: meeting.id
          });
        }
      });

      (state.recurringMeetings || []).forEach(meeting => {
        const days = meeting.days || [];
        if (!days.length || !meeting.time) return;

        for (let offset = 0; offset < 8; offset += 1) {
          const target = new Date(now);
          target.setDate(now.getDate() + offset);
          if (!days.includes(target.getDay())) continue;

          const [hh, mm] = meeting.time.split(":").map(Number);
          const meetingAt = new Date(target.getFullYear(), target.getMonth(), target.getDate(), hh, mm, 0, 0);
          const before = Number(meeting.before ?? state.defaultBefore ?? 2);
          const alarmAt = new Date(meetingAt.getTime() - before * 60 * 1000);
          const recurringDateKey = dateKey(meetingAt);
          const recurringKey = `recurring-${meeting.id}-${recurringDateKey}-${meeting.time}`;

          if (state.skippedRecurring && state.skippedRecurring[recurringKey]) continue;

          if (meetingAt >= now || alarmAt >= new Date(now.getTime() - 60 * 1000)) {
            events.push({
              type: "meeting",
              at: alarmAt,
              meetingAt,
              title: meeting.title,
              text: makeRecurringText(meeting),
              key: recurringKey,
              kind: "recurring",
              id: meeting.id
            });
            break;
          }
        }
      });

      return events.sort((a, b) => a.at - b.at);
    }

    function getTodayMeetings(now) {
      const today = dateKey(now);
      const meetings = [];

      state.meetings.forEach(meeting => {
        if (meeting.date !== today) return;

        const meetingAt = toDateTime(meeting.date, meeting.time);
        if (meetingAt < now) return;

        const before = Number(meeting.before || state.defaultBefore || 2);
        meetings.push({
          at: meetingAt,
          title: meeting.title,
          key: `meeting-${meeting.id}-${meeting.date}-${meeting.time}`,
          kind: "meeting",
          id: meeting.id,
          before
        });
      });

      (state.recurringMeetings || []).forEach(meeting => {
        const days = meeting.days || [];
        if (!days.includes(now.getDay()) || !meeting.time) return;

        const [hh, mm] = meeting.time.split(":").map(Number);
        const meetingAt = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hh, mm, 0, 0);
        if (meetingAt < now) return;

        const before = Number(meeting.before ?? state.defaultBefore ?? 2);
        const key = `recurring-${meeting.id}-${today}-${meeting.time}`;
        if (state.skippedRecurring && state.skippedRecurring[key]) return;

        meetings.push({
          at: meetingAt,
          title: meeting.title,
          key,
          kind: "recurring",
          id: meeting.id,
          before
        });
      });

      return meetings.sort((a, b) => a.at - b.at);
    }

    function deleteScheduleItem(kind, id, key) {
      if (kind === "recurring") {
        state.skippedRecurring = state.skippedRecurring || {};
        state.skippedRecurring[key] = true;
      } else {
        state.meetings = state.meetings.filter(meeting => meeting.id !== id);
      }

      saveState();
      render();
    }

    function renderTodaySchedule(now, next) {
      const nextKey = next && next.type === "meeting" ? next.key : "";
      const meetings = getTodayMeetings(now).filter(meeting => meeting.key !== nextKey);

      el.todaySchedule.innerHTML = "";
      el.todaySchedule.hidden = meetings.length === 0;

      meetings.forEach(meeting => {
        const item = document.createElement("div");
        item.className = "schedule-item";
        item.innerHTML = `
          <span class="schedule-time">${pad(meeting.at.getHours())}：${pad(meeting.at.getMinutes())}</span>
          <span class="schedule-title">${escapeHtml(meeting.title)}</span>
          <button class="schedule-delete" type="button" data-kind="${meeting.kind}" data-id="${meeting.id}" data-key="${meeting.key}" aria-label="${escapeHtml(meeting.title)}を削除">
            <span aria-hidden="true">×</span>
          </button>
        `;
        el.todaySchedule.appendChild(item);
      });

      el.todaySchedule.querySelectorAll(".schedule-delete").forEach(btn => {
        btn.addEventListener("click", () => {
          deleteScheduleItem(btn.dataset.kind, btn.dataset.id, btn.dataset.key);
        });
      });
    }

    function hasMeetingStartingAt(dateObj) {
      const date = dateKey(dateObj);
      const time = `${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}`;
      const hasOneTimeMeeting = state.meetings.some(m => m.date === date && m.time === time);
      const hasRecurringMeeting = (state.recurringMeetings || []).some(m => {
        const days = m.days || [];
        const key = `recurring-${m.id}-${date}-${m.time}`;
        return days.includes(dateObj.getDay()) && m.time === time && !(state.skippedRecurring && state.skippedRecurring[key]);
      });
      return hasOneTimeMeeting || hasRecurringMeeting;
    }

    function tick() {
      const now = new Date();
      el.clock.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
      el.dateText.textContent = formatDate(now);

      const events = getEvents(now);
      const next = events.find(e => e.type === "meeting"
        ? e.meetingAt >= now
        : e.at >= new Date(now.getTime() - 1000));

      if (next) {
        const diffBase = next.type === "meeting" ? next.meetingAt : next.at;
        const diffMs = diffBase - now;
        const diffMin = Math.max(0, Math.ceil(diffMs / 60000));
        const timeText = `${pad(next.at.getHours())}:${pad(next.at.getMinutes())}`;

        el.nextTitle.textContent = next.title;
        el.nextMeta.textContent = next.type === "meeting"
          ? `${timeText}に読み上げ／開始 ${pad(next.meetingAt.getHours())}:${pad(next.meetingAt.getMinutes())}／開始まで約${diffMin}分`
          : `${timeText}に読み上げ／あと約${diffMin}分`;

        el.nextDeleteBtn.hidden = next.type !== "meeting";
        if (next.type === "meeting") {
          el.nextDeleteBtn.dataset.kind = next.kind;
          el.nextDeleteBtn.dataset.id = next.id;
          el.nextDeleteBtn.dataset.key = next.key;
          el.nextDeleteBtn.setAttribute("aria-label", `${next.title}を削除`);
        }
      } else {
        el.nextTitle.textContent = "予定はありません";
        el.nextMeta.textContent = "打ち合わせ予定を追加できます。";
        el.nextDeleteBtn.hidden = true;
      }

      renderTodaySchedule(now, next);

      if (!state.running) return;

      const dueEvents = getEvents(now).filter(e => Math.abs(e.at - now) < 30 * 1000);

      dueEvents.forEach(event => {
        if (event.type === "hourly" && hasMeetingStartingAt(event.at)) return;

        const dayKey = dateKey(now);
        const key = `${dayKey}-${event.key}`;

        if (!state.spokenKeys[key]) {
          speak(event.text);
          state.spokenKeys[key] = true;
          saveState();
        }
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateMeetingLink(link, url) {
      const href = String(url || "").trim();
      link.href = href || "#";
      link.toggleAttribute("aria-disabled", !href);
    }

    function render() {
      el.status.classList.toggle("on", state.running);
      el.statusToggle.setAttribute("aria-pressed", String(state.running));
      el.statusText.textContent = state.running ? "ON" : "停止中";

      el.hourlyText.value = state.hourlyText;
      el.calendarUrl.value = state.calendarUrl || "calendar.html";
      el.morningMtgUrl.value = state.morningMtgUrl || "";
      el.nightMtgUrl.value = state.nightMtgUrl || "";
      updateMeetingLink(el.morningMtgLink, state.morningMtgUrl);
      updateMeetingLink(el.nightMtgLink, state.nightMtgUrl);
      el.voiceRate.value = String(state.voiceRate || 1);
      el.voicePitch.value = String(state.voicePitch || 1.15);
      if (el.voiceSelect.options.length > 1) {
        el.voiceSelect.value = state.voiceName || "";
      }

      el.recurringBefore.value = el.recurringBefore.value || state.defaultBefore || 2;
      el.recurringList.innerHTML = "";

      const sortedRecurring = [...(state.recurringMeetings || [])].sort((a, b) => a.time.localeCompare(b.time));

      sortedRecurring.forEach(meeting => {
        const div = document.createElement("div");
        div.className = "meeting";
        div.innerHTML = `
          <div>
            <strong>${escapeHtml(meeting.title)}</strong>
            <small>${weekdayLabel(meeting.days || [])} ${meeting.time}／${meeting.before ?? state.defaultBefore ?? 2}分前に読み上げ</small>
          </div>
          <button class="danger small-btn" data-id="${meeting.id}">削除</button>
        `;
        el.recurringList.appendChild(div);
      });

      el.recurringList.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          state.recurringMeetings = (state.recurringMeetings || []).filter(m => m.id !== btn.dataset.id);
          saveState();
          render();
        });
      });

      tick();
    }

    function bind() {
      el.statusToggle.addEventListener("click", () => {
        state.running = !state.running;
        if (!state.running) {
          window.speechSynthesis.cancel();
        }
        saveState();
        render();
        if (state.running) {
          speak("読み上げを開始");
        }
      });

      el.openCalendarBtn.addEventListener("click", () => {
        state.calendarUrl = el.calendarUrl.value || "calendar.html";
        saveState();

        const w = 1200;
        const h = 820;
        const left = Math.max(0, Math.round((window.screen.width - w) / 2));
        const top = Math.max(0, Math.round((window.screen.height - h) / 2));

        const features = [
          `width=${w}`,
          `height=${h}`,
          `left=${left}`,
          `top=${top}`,
          "resizable=yes",
          "scrollbars=yes",
          "noopener=no"
        ].join(",");

        window.open(state.calendarUrl, "calendarWindow", features);
      });

      el.nextDeleteBtn.addEventListener("click", () => {
        deleteScheduleItem(el.nextDeleteBtn.dataset.kind, el.nextDeleteBtn.dataset.id, el.nextDeleteBtn.dataset.key);
      });

      [el.morningMtgLink, el.nightMtgLink].forEach(link => {
        link.addEventListener("click", event => {
          if (link.getAttribute("aria-disabled") === "true") {
            event.preventDefault();
            alert("設定からMTG URLを入力してください。");
          }
        });
      });

      [el.hourlyText, el.calendarUrl, el.morningMtgUrl, el.nightMtgUrl, el.voiceSelect, el.voiceRate, el.voicePitch].forEach(input => {
        input.addEventListener("change", () => {
          state.hourlyText = el.hourlyText.value || defaultState.hourlyText;
          state.calendarUrl = el.calendarUrl.value || "calendar.html";
          state.morningMtgUrl = el.morningMtgUrl.value.trim();
          state.nightMtgUrl = el.nightMtgUrl.value.trim();
          state.voiceName = el.voiceSelect.value || "";
          state.voiceRate = Number(el.voiceRate.value || 1);
          state.voicePitch = Number(el.voicePitch.value || 1.15);
          saveState();
          render();
        });
      });

      el.testVoiceBtn.addEventListener("click", () => {
        state.voiceName = el.voiceSelect.value || "";
        state.voiceRate = Number(el.voiceRate.value || 1);
        state.voicePitch = Number(el.voicePitch.value || 1.15);
        saveState();
        const sampleHour = new Date().getHours();
        const testText = (el.hourlyText.value || defaultState.hourlyText).replaceAll("{hour}", sampleHour);
        speak(testText);
      });

      el.addMeetingBtn.addEventListener("click", () => {
        const date = dateKey(new Date());
        const time = el.meetingTime.value;
        const before = Number(el.meetingBefore.value || state.defaultBefore || 2);
        const title = el.meetingTitle.value.trim();

        if (!time || !title) {
          alert("開始時刻・予定名を入れてください。");
          return;
        }

        state.meetings.push({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          date,
          time,
          title,
          text: el.meetingText.value.trim(),
          before
        });

        el.meetingTime.value = "";
        el.meetingBefore.value = state.defaultBefore || 2;
        el.meetingTitle.value = "";
        el.meetingText.value = "";

        saveState();
        render();
      });

      el.addRecurringBtn.addEventListener("click", () => {
        const title = el.recurringTitle.value.trim();
        const time = el.recurringTime.value;
        const days = [...el.recurringWeekdays.querySelectorAll("input:checked")].map(input => Number(input.value));
        const before = Number(el.recurringBefore.value || state.defaultBefore || 2);

        if (!title || !time || !days.length) {
          alert("タイトル・曜日・開始時刻を入れてください。");
          return;
        }

        state.recurringMeetings = state.recurringMeetings || [];
        state.recurringMeetings.push({
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
          title,
          days,
          time,
          before
        });

        el.recurringTitle.value = "";
        el.recurringTime.value = "";
        el.recurringBefore.value = state.defaultBefore || 2;
        el.recurringWeekdays.querySelectorAll("input").forEach(input => {
          input.checked = false;
        });

        saveState();
        render();
      });
    }

    function setCatFavicon() {
      const catImg = document.querySelector(".cat-wrap img");
      if (!catImg) return;

      const icon = document.createElement("link");
      icon.rel = "icon";
      icon.type = "image/png";
      icon.href = catImg.src;

      document.head.querySelectorAll('link[rel="icon"]').forEach(link => link.remove());
      document.head.appendChild(icon);
    }

    setCatFavicon();
    loadVoices();
    if ("onvoiceschanged" in window.speechSynthesis) {
      window.speechSynthesis.onvoiceschanged = () => {
        loadVoices();
        render();
      };
    }

    bind();
    render();
    setInterval(tick, 1000);
  </script>
</body>
</html>
